name: "2. Terraform Plan (PR Review)"

on:
    pull_request:
        paths:
            - "terraform/**"

jobs:
    plan:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            id-token: write # Needed for GCP Workload Identity Federation

        defaults:
            run:
                working-directory: terraform

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
                  service_account: "${{ secrets.GCP_SERVICE_ACCOUNT }}"

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Format
              id: fmt
              run: terraform fmt -check -diff

            # Assume that anything running in a PR is targeting the dev environment workspace
            - name: Terraform Init
              id: init
              run: terraform init -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" -backend-config="prefix=terraform/dev-state"

            # Select Dev Workspace
            - name: Terraform Workspace
              run: terraform workspace select dev || terraform workspace new dev

            - name: Terraform Plan
              id: plan
              # Note: We pass standard input variables if needed via -var
              run: |
                  terraform plan -no-color \
                    -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
                    -var="region=us-central1" \
                    -out=tfplan
              continue-on-error: true

            - name: Post Plan info on PR Comment
              uses: actions/github-script@v7
              if: github.event_name == 'pull_request'
              env:
                  PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      // 1. Retrieve existing bot comments for the PR
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      })
                      const botComment = comments.find(comment => {
                        return comment.user.type === 'Bot' && comment.body.includes('Terraform Format and Style')
                      })

                      // 2. Prepare format of the comment
                      const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
                      #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
                      #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

                      <details><summary>Show Plan</summary>

                      \`\`\`\n
                      ${process.env.PLAN}
                      \`\`\`

                      </details>

                      *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Working Directory: \`${{ env.tf_actions_working_dir }}\`, Workflow: \`${{ github.workflow }}\`*`;

                      // 3. If we have a comment, update it, otherwise create a new one
                      if (botComment) {
                        github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: botComment.id,
                          body: output
                        })
                      } else {
                        github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body: output
                        })
                      }
